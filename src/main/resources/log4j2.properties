status = error
name = SparkLogConfig

rootLogger.level = error
rootLogger.appenderRefs = console
rootLogger.appenderRef.console.ref = ConsoleAppender

appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss} %-5p %c{1}:%L - %m%n

logger.spark.name = org.apache.spark
logger.spark.level = info

logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = error

logger.iceberg.name = org.apache.iceberg
logger.iceberg.level = error

logger.parquet.name = org.apache.parquet
logger.parquet.level = error

logger.hive.name = org.apache.hive
logger.hive.level = error
